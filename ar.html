<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Nusantara - Pertarungan AR (WebXR)</title>
    <!-- KITA BUANG AR.JS, HANYA PAKAI A-FRAME MURNI UNTUK WEBXR -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- BUNGKUS UI KHUSUS WEBXR -->
    <!-- pointer-events diatur agar kamu tetap bisa ngeklik monster di belakang layar yang kosong -->
    <div id="ui-overlay" style="position: absolute; z-index: 1000; width: 100%; height: 100%; pointer-events: none;">
        
        <!-- KUIS -->
        <div id="quiz-container" style="display: none; pointer-events: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #3498db; border-radius: 10px; color: white; text-align: center;">
            <h2>Tantangan Artefak!</h2>
            <p>Atap bangunan tradisional Rumah Gadang terinspirasi dari bentuk tanduk hewan apa?</p>
            <button class="btn-a" onclick="jawabKuis(true)">A. Kerbau</button>
            <button class="btn-b" onclick="jawabKuis(false)">B. Kambing</button>
        </div>

    </div>

    <!-- KAMERA & BENTUK DASAR (WEBXR MODE) -->
    <!-- dom-overlay digunakan agar kuis tetap muncul saat AR menyala -->
    <a-scene webxr="optionalFeatures: dom-overlay; overlayElement: #ui-overlay;" cursor="rayOrigin: mouse" raycaster="objects: .bisa-diklik">
        
        <!-- KOTAK MERAH PENGGANTI MONSTER (Kita pakai kotak dulu ya biar gampang dites) -->
        <a-box id="monster" position="0 0.5 -3" scale="1 1 1" color="#e74c3c"></a-box>
        
        <!-- BOLA BIRU PENGGANTI SENJATA -->
        <a-sphere id="artefak" position="0 1 -1.5" scale="0.3 0.3 0.3" color="#3498db" class="bisa-diklik" animation="property: position; dir: alternate; dur: 2000; to: 0 1.2 -1.5; loop: true"></a-sphere>

        <!-- KAMERA -->
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script src="ar-logic.js"></script>
</body>
</html>
