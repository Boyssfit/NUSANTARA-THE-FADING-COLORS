<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Nusantara - Pertarungan AR</title>
    <!-- Kita kembalikan AR.js agar kamera langsung menyala -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- LAYER KUIS -->
    <div id="quiz-container" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #3498db; border-radius: 10px; color: white; text-align: center; z-index: 1000;">
        <h2>Tantangan Artefak!</h2>
        <p>Atap bangunan tradisional Rumah Gadang terinspirasi dari bentuk tanduk hewan apa?</p>
        <button class="btn-a" onclick="jawabKuis(true)">A. Kerbau</button>
        <button class="btn-b" onclick="jawabKuis(false)">B. Kambing</button>
    </div>

    <!-- DUNIA AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .bisa-diklik">
        
        <a-assets>
            <!-- Ganti dengan nama file aslinya ya! -->
            <a-asset-item id="model-monster" src="monster/bread_monster_model.glb"></a-asset-item>
            <a-asset-item id="model-senjata" src="senjata/keris.glb"></a-asset-item>
        </a-assets>

        <!-- KITA GUNAKAN HIRO MARKER -->
        <a-marker preset="hiro">
            
            <!-- MONSTER -->
            <!-- Posisinya diatur 0,0,0 agar pas berdiri di tengah marker -->
            <a-gltf-model id="monster" src="#model-monster" position="0 0 0" scale="0.1 0.1 0.1"></a-gltf-model>
            
            <!-- KERIS (Senjata) -->
            <!-- Posisinya aku taruh agak ke depan (Z: 1) dan melayang (Y: 1) -->
            <a-gltf-model id="artefak" src="#model-senjata" position="0 1 1" scale="0.3 0.3 0.3" class="bisa-diklik" animation="property: position; dir: alternate; dur: 2000; to: 0 1.2 1; loop: true"></a-gltf-model>
            
        </a-marker>

        <a-camera></a-camera>
    </a-scene>

    <script src="ar-logic.js"></script>
</body>
</html>
