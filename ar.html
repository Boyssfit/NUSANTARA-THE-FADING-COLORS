<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Nusantara - Pertarungan AR</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- KUIS -->
    <div id="quiz-container" style="display: none;">
        <h2>Tantangan Artefak!</h2>
        <p>Atap bangunan tradisional Rumah Gadang terinspirasi dari bentuk tanduk hewan apa?</p>
        <button class="btn-a" onclick="jawabKuis(true)">A. Kerbau</button>
        <button class="btn-b" onclick="jawabKuis(false)">B. Kambing</button>
    </div>

    <!-- KAMERA & 3D -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .bisa-diklik">
        <a-assets>
            <a-asset-item id="model-monster" src="monster/bread_monster_model.glb"></a-asset-item>
            <a-asset-item id="model-senjata" src="senjata/keris.glb"></a-asset-item>
        </a-assets>

        <a-gltf-model id="monster" src="#model-monster" position="0 -1 -10" scale="0.3 0.3 0.3"></a-gltf-model>
        <a-gltf-model id="artefak" src="#model-senjata" position="0 0 -5" scale="0.5 0.5 0.5" class="bisa-diklik" animation="property: position; dir: alternate; dur: 2000; to: 0 0.5 -5; loop: true"></a-gltf-model>

        <a-camera></a-camera>
    </a-scene>

    <!-- Panggil file logika AR -->
    <script src="ar-logic.js"></script>
</body>
</html>
