<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Nusantara - Pertarungan AR (WebXR)</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <!-- BUNGKUS UI KHUSUS WEBXR -->
    <div id="ui-overlay" style="position: absolute; z-index: 1000; width: 100%; height: 100%; pointer-events: none;">
        
        <!-- KUIS -->
        <div id="quiz-container" style="display: none; pointer-events: auto; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid #3498db; border-radius: 10px; color: white; text-align: center;">
            <h2>Tantangan Artefak!</h2>
            <p>Atap bangunan tradisional Rumah Gadang terinspirasi dari bentuk tanduk hewan apa?</p>
            <button class="btn-a" onclick="jawabKuis(true)">A. Kerbau</button>
            <button class="btn-b" onclick="jawabKuis(false)">B. Kambing</button>
        </div>

    </div>

    <!-- KAMERA & DUNIA AR (WEBXR) -->
    <a-scene webxr="optionalFeatures: dom-overlay; overlayElement: #ui-overlay;" cursor="rayOrigin: mouse" raycaster="objects: .bisa-diklik">
        
        <!-- ========================================== -->
        <!-- 1. KEMBALIKAN ASET 3D KITA -->
        <!-- ========================================== -->
        <a-assets>
            <!-- Ganti ini dengan nama file monster kamu -->
            <a-asset-item id="model-monster" src="monster/bread_monster_model.glb"></a-asset-item>
            
            <!-- Ganti ini dengan nama file keris kamu -->
            <a-asset-item id="model-senjata" src="senjata/keris.glb"></a-asset-item>
        </a-assets>

        <!-- ========================================== -->
        <!-- 2. MUNCULKAN MONSTER ASLINYA -->
        <!-- ========================================== -->
        <!-- Posisi Z -3 artinya 3 meter di depanmu. Posisi Y 0 artinya dia berpijak di lantai -->
        <a-gltf-model id="monster" src="#model-monster" position="0 0 -3" scale="0.3 0.3 0.3"></a-gltf-model>
        
        <!-- ========================================== -->
        <!-- 3. MUNCULKAN KERISNYA -->
        <!-- ========================================== -->
        <!-- Posisi Y 1 artinya dia melayang 1 meter dari lantai, Z -1.5 artinya lebih dekat denganmu -->
        <a-gltf-model id="artefak" src="#model-senjata" position="0 1 -1.5" scale="0.5 0.5 0.5" class="bisa-diklik" animation="property: position; dir: alternate; dur: 2000; to: 0 1.2 -1.5; loop: true"></a-gltf-model>

        <!-- KAMERA -->
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script src="ar-logic.js"></script>
</body>
</html>
