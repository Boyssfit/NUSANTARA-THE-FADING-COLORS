<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Nusantara: The Fading Colors</title>
    <!-- A-Frame & AR.js Libraries -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ========================================== -->
    <!-- LAYER UI (MENUTUPI LAYAR SEBELUM MASUK AR) -->
    <!-- ========================================== -->
    <div id="game-ui-layer">
        
        <!-- Background Visual Novel -->
        <div id="story-bg"></div>
        
        <!-- Kotak Dialog Story -->
        <div id="dialog-box">
            <h3 id="dialog-name"></h3>
            <p id="story-text"></p>
            <button id="next-btn" class="btn-next" style="display: none;">Lanjut ❯</button>
        </div>

        <!-- Formulir Pembuatan Karakter -->
        <div id="reg-container">
            <h2>Pilih Identitasmu</h2>
            <p>Siapa namamu, Pahlawan?</p>
            <input type="text" id="player-name" placeholder="Ketik namamu di sini..." autocomplete="off">
            
            <p>Pilih Faksi / Sukumu:</p>
            <div class="char-grid">
                <!-- Data-suku dipakai oleh JavaScript untuk tahu apa yang diklik -->
                <div class="char-card" data-suku="Suku Minang">
                    <div class="char-icon">🐃</div>
                    <div>Minang</div>
                </div>
                <div class="char-card" data-suku="Suku Bali">
                    <div class="char-icon">👺</div>
                    <div>Bali</div>
                </div>
                <div class="char-card" data-suku="Suku Dayak">
                    <div class="char-icon">🦅</div>
                    <div>Dayak</div>
                </div>
            </div>
            
            <button class="btn-submit" onclick="konfirmasiKarakter()">Mulai Petualangan!</button>
        </div>
        
    </div>

    <!-- ========================================== -->
    <!-- LAYER UI KUIS AR                           -->
    <!-- ========================================== -->
    <div id="quiz-container">
        <h2>Tantangan Artefak!</h2>
        <p>Atap bangunan tradisional Rumah Gadang terinspirasi dari bentuk tanduk hewan apa?</p>
        <button class="btn-a" onclick="jawabKuis(true)">A. Kerbau</button>
        <button class="btn-b" onclick="jawabKuis(false)">B. Kambing</button>
    </div>

    <!-- ========================================== -->
    <!-- DUNIA KAMERA AR (3D SCENE)                 -->
    <!-- ========================================== -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .bisa-diklik">
        
        <!-- Monster Merah -->
        <a-box id="monster" color="#e74c3c" position="0 1 -5" scale="1 1 1"></a-box>
        
        <!-- Artefak Biru -->
        <a-sphere id="artefak" color="#3498db" position="0 0.5 -2.5" scale="0.4 0.4 0.4" class="bisa-diklik" animation="property: position; dir: alternate; dur: 2000; to: 0 0.8 -2.5; loop: true"></a-sphere>

        <!-- Kamera -->
        <a-camera></a-camera>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
