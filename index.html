<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Nusantara: The Fading Colors</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Overlay Cerita -->
    <div id="story-overlay">
        <h2 id="story-text">Tahun 2026. Warna Nusantara memudar...</h2>
        <button id="next-btn" class="btn-start">Lanjut</button>
    </div>

    <!-- UI Kuis -->
    <div id="quiz-container">
        <h2>Tantangan Artefak!</h2>
        <p>Atap rumah Gadang terinspirasi tanduk hewan apa?</p>
        <button class="btn-a" onclick="jawabKuis(true)">A. Kerbau</button>
        <button class="btn-b" onclick="jawabKuis(false)">B. Kambing</button>
    </div>

    <!-- Dunia AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="rayOrigin: mouse" raycaster="objects: .bisa-diklik">
        <a-box id="monster" color="red" position="0 1 -4" scale="1 1 1"></a-box>
        <a-sphere id="artefak" color="blue" position="0 0.5 -2" scale="0.4 0.4 0.4" class="bisa-diklik"></a-sphere>
        <a-camera></a-camera>
    </a-scene>

    <script src="script.js"></script>
</body>
</html>
