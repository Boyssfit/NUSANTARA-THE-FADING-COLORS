<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Nusantara: The Fading Colors - AR Test</title>
    <!-- Memanggil Framework A-Frame & AR.js dari Server -->
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <!-- Membuka Dunia AR -->
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Objek 3D: Kubus Merah yang melayang di depan kamera -->
      <a-box position="0 0.5 -3" color="#EF2D5E" animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"></a-box>
      
      <!-- Kamera Pemain -->
      <a-camera></a-camera>
      
    </a-scene>

  </body>
</html>
