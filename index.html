<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Nusantara: Prototipe Tempur</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      /* Desain UI Kuis Pop-up (Tampil di atas kamera) */
      #quiz-container {
        display: none; /* Disembunyikan dari awal */
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.8);
        color: white;
        padding: 20px;
        border-radius: 10px;
        text-align: center;
        z-index: 1000;
        font-family: Arial, sans-serif;
        width: 80%;
      }
      button {
        padding: 10px 20px;
        margin: 10px;
        font-size: 16px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
      }
      .btn-a { background-color: #4CAF50; color: white; }
      .btn-b { background-color: #f44336; color: white; }
    </style>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <!-- UI Kuis -->
    <div id="quiz-container">
      <h2>Tantangan Artefak!</h2>
      <p>Atap bangunan Rumah Gadang terinspirasi dari bentuk tanduk hewan apa?</p>
      <button class="btn-a" onclick="jawabKuis(true)">A. Kerbau</button>
      <button class="btn-b" onclick="jawabKuis(false)">B. Kambing</button>
    </div>

    <!-- Dunia AR: rayOrigin: mouse berfungsi agar layar HP bisa disentuh untuk interaksi -->
    <a-scene embedded arjs="sourceType: webcam;" cursor="rayOrigin: mouse" raycaster="objects: .bisa-diklik">
      
      <!-- Monster (Jauh di depan) -->
      <a-box id="monster" color="red" position="0 1 -4" scale="1 1 1"></a-box>
      
      <!-- Artefak (Lebih dekat, bola biru, diberi class 'bisa-diklik') -->
      <a-sphere id="artefak" color="blue" position="0 0.5 -2" scale="0.5 0.5 0.5" class="bisa-diklik" animation="property: position; dir: alternate; dur: 2000; to: 0 0.7 -2; loop: true"></a-sphere>

      <!-- Kamera -->
      <a-camera></a-camera>
    </a-scene>

    <!-- Logika JavaScript Game -->
    <script>
      const artefak = document.querySelector('#artefak');
      const monster = document.querySelector('#monster');
      const quizContainer = document.querySelector('#quiz-container');

      // Saat artefak diketuk di layar HP
      artefak.addEventListener('click', () => {
        quizContainer.style.display = 'block'; // Tampilkan kuis
      });

      // Fungsi untuk mengecek jawaban dari tombol
      function jawabKuis(isBenar) {
        quizContainer.style.display = 'none'; // Sembunyikan kuis lagi

        if (isBenar) {
          alert('BENAR! Serangan diluncurkan!');
          // Animasi monster mengecil (kena damage)
          monster.setAttribute('scale', '0.5 0.5 0.5'); 
          monster.setAttribute('color', 'orange');
        } else {
          alert('SALAH! Artefak tidak merespons.');
        }
      }
    </script>
  </body>
</html>
