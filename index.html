<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Nusantara: The Fading Colors - Prolog</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-ui-layer">
        <div id="story-bg"></div>
        <div id="dialog-box">
            <h3 id="dialog-name"></h3>
            <p id="story-text"></p>
            <button id="next-btn" class="btn-next" style="display: none;">Lanjut ❯</button>
        </div>

        <div id="reg-container">
            <h2>Pilih Identitasmu</h2>
            <p>Siapa namamu, Pahlawan?</p>
            <input type="text" id="player-name" placeholder="Ketik namamu di sini..." autocomplete="off">
            <p>Pilih Faksi / Sukumu:</p>
            <div class="char-grid">
                <div class="char-card" data-suku="Suku Minang"><div class="char-icon">🐃</div><div>Minang</div></div>
                <div class="char-card" data-suku="Suku Bali"><div class="char-icon">👺</div><div>Bali</div></div>
                <div class="char-card" data-suku="Suku Dayak"><div class="char-icon">🦅</div><div>Dayak</div></div>
            </div>
            <button class="btn-submit" onclick="konfirmasiKarakter()">Mulai Petualangan!</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
